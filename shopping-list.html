<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 700;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.96);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      padding: 0 2px;
    }

    .stats .done-count {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.8rem;
    }

    li.checked .check-btn {
      background: #48bb78;
      border-color: #48bb78;
      color: #fff;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.97rem;
    }

    .empty .empty-icon {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .clear-btn:hover {
      color: #fc8181;
      border-color: #fc8181;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="item-input" placeholder="아이템을 입력하세요..." autocomplete="off" />
      <button onclick="addItem()" title="추가">+</button>
    </div>

    <div class="stats">
      <span id="total-count">총 0개</span>
      <span class="done-count" id="done-count"></span>
    </div>

    <ul id="list"></ul>

    <div class="empty" id="empty-state">
      <div class="empty-icon">📝</div>
      <div>아직 아이템이 없습니다.<br>위에서 추가해 보세요!</div>
    </div>

    <button class="clear-btn" id="clear-btn" onclick="clearChecked()" style="display:none;">
      완료된 항목 모두 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');

    const input = document.getElementById('item-input');
    const list = document.getElementById('list');
    const emptyState = document.getElementById('empty-state');
    const clearBtn = document.getElementById('clear-btn');
    const totalCount = document.getElementById('total-count');
    const doneCount = document.getElementById('done-count');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';

      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-btn';
        checkBtn.innerHTML = item.checked ? '✓' : '';
        checkBtn.title = item.checked ? '완료 취소' : '완료';
        checkBtn.onclick = () => toggleItem(i);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✕';
        delBtn.title = '삭제';
        delBtn.onclick = () => deleteItem(i);

        li.append(checkBtn, text, delBtn);
        list.appendChild(li);
      });

      const checked = items.filter(x => x.checked).length;
      const total = items.length;

      totalCount.textContent = `총 ${total}개`;
      doneCount.textContent = checked > 0 ? `✓ ${checked}개 완료` : '';
      emptyState.style.display = total === 0 ? 'block' : 'none';
      clearBtn.style.display = checked > 0 ? 'block' : 'none';
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggleItem(i) {
      items[i].checked = !items[i].checked;
      save();
      render();
    }

    function deleteItem(i) {
      items.splice(i, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(x => !x.checked);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
